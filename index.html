<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fröken Selfoss – Travel Agency Group Quote</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #fff; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { opacity: 1; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ─── PASTE YOUR GOOGLE SHEET URLS HERE WHEN READY ───────────────────────────
const SHEET_CONFIG = {
  menus:    "",
  extras:   "",
  settings: "",
};
// ─────────────────────────────────────────────────────────────────────────────

const APPETIZERS = [
  {id:"salmon",  label:"Hot smoked salmon on Icelandic flatbread"},
  {id:"reindeer",label:"Reindeer carpaccio with sorrel & ruccola pesto, Grettir cheese"},
  {id:"soup",    label:"Seafood soup, sea truffle cream & sourdough bread"},
  {id:"veganApp",label:"Vegan: Deep-fried broccoli tempura, sesame vinaigrette & sesame seeds", vegan:true},
];
const MAINS = [
  {id:"steak",    label:"Steak dinner (selection changes — check online menu)"},
  {id:"char",     label:"Pan-fried Arctic char, roasted vegetables"},
  {id:"veganMain",label:"Vegan: Wellington vegetable roast, Greenway chunks, roasted vegetables & sesame sauce", vegan:true},
];
const DINNER_DESSERTS = [
  {id:"cake",        label:"Chocolate cake, skyr ganache, caramel, and wild bilberries"},
  {id:"veganDessert",label:"Vegan: Warm rhubarb & apple crumble, caramelized oats, cream ice cream & berries", vegan:true},
];
const UPGRADE_PRICE = 1100;

const FALLBACK_MENUS = [
  {id:"d1", category:"dinner", label:"Menu #1 – Two Course Dinner",       price:9990,  desc:"Whole group chooses: Appetiser + Main OR Main + Dessert"},
  {id:"d2", category:"dinner", label:"Menu #2 – Three Course Dinner",     price:11990, desc:"Appetiser + Main + Dessert for all"},
  {id:"d3", category:"dinner", label:"Menu #3 – Soup & Fish",             price:6390,  desc:"Soup of the day + fish of the day"},
  {id:"d4", category:"dinner", label:"Menu #4 – Lobster Fantasy",         price:14990, desc:"Seafood soup, Atlantic lobster, lava cake"},
  {id:"d5", category:"dinner", label:"Menu #5 – Timeless Iceland Tastes", price:15990, desc:"Shared appetizers & mains, plated dessert"},
  {id:"d6", category:"dinner", label:"Menu #6 – 7 Course Tasting Menu",   price:14990, desc:"Full tasting experience"},
  {id:"l1", category:"lunch",  label:"Menu #1 – Soup & Fish",             price:4490,  desc:"Soup of the day + fish of the day"},
  {id:"l2", category:"lunch",  label:"Menu #2 – Main & Dessert",          price:3990,  desc:"À la carte main (each guest chooses) + complimentary lava cake for all", variablePrice:true},
  {id:"l3a",category:"lunch",  label:"Menu #3 – Soup Buffet (Soup of Day)",price:2990, desc:"Free refills included"},
  {id:"l3b",category:"lunch",  label:"Menu #3 – Soup Buffet (Traditional)",price:4390, desc:"Icelandic lamb or seafood soup"},
  {id:"l4", category:"lunch",  label:"Menu #4 – Icelandic Menu (4 Course)",price:7990, desc:"Icelandic platter, goat tartare, slow-cooked lamb, skyr"},
  {id:"l5", category:"lunch",  label:"Menu #5 – Two Course",              price:6990,  desc:"Appetiser + Main — upgrade to 3 courses with dessert for 1,100 kr/person"},
  {id:"l6", category:"lunch",  label:"Menu #6 – Luxury Brunch Buffet",    price:7290,  desc:"Extravagant buffet (children's discounts apply)"},
];
const FALLBACK_EXTRAS = [
  {id:"wine2",   type:"drink",   label:"2 Bottles House Wine",           price:11990},
  {id:"beer5",   type:"drink",   label:"5 Bottles House Beer",           price:4990},
  {id:"soft5",   type:"drink",   label:"5 Soft Drinks",                  price:1990},
  {id:"prosecco",type:"drink",   label:"0% Kylie Minogue Rosé Prosecco", price:4990},
  {id:"v_beer",  type:"voucher", label:"Draft Beer & Bottled Cider",     price:999},
  {id:"v_wine",  type:"voucher", label:"Glass of House Wine",            price:1499},
  {id:"v_soft",  type:"voucher", label:"Soft Drinks",                    price:390},
  {id:"cake",    type:"addon",   label:"Birthday Cake (serves 6–10)",    price:7990, note:"Chocolate mousse layer cake"},
];
const FALLBACK_SETTINGS = {
  discount_weekday:0.13, discount_weekend:0.10,
  free_meal_min_guests:12, free_meal_base:1,
  free_meal_next_threshold:20, free_meal_next_base:2,
  free_meal_increment:10, min_group_size:10,
};

const ISK = n => new Intl.NumberFormat("is-IS").format(Math.round(n))+" kr.";
const quoteRef = "FS-"+Date.now().toString(36).toUpperCase().slice(-6);
const iS = {border:"1px solid #e5e7eb",borderRadius:5,padding:"5px 8px",fontSize:13,width:"100%",boxSizing:"border-box",outline:"none",background:"#fff"};
const thS = r => ({padding:"8px 10px",fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:.5,background:"#f9fafb",borderBottom:"1px solid #e5e7eb",textAlign:r?"right":"left"});
const tdS = (r,b) => ({padding:"8px 10px",fontSize:b?14:13,fontWeight:b?800:400,borderBottom:"1px solid #f3f4f6",textAlign:r?"right":"left",fontVariantNumeric:"tabular-nums"});
const LBL = ({t}) => React.createElement("div",{style:{fontSize:12,color:"#6b7280",marginBottom:3}},t);
const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

async function fetchSheet(url){
  if(!url)return null;
  try{const r=await fetch(url);if(!r.ok)return null;const d=Papa.parse(await r.text(),{header:true,skipEmptyLines:true,dynamicTyping:true});return d.data;}
  catch{return null;}
}
const parseMenus=rows=>rows.filter(r=>String(r.active).toUpperCase()!=="FALSE").map(r=>({id:String(r.id||"").trim(),category:String(r.category||"").trim(),label:String(r.label||"").trim(),price:parseFloat(r.price)||0,desc:String(r.desc||"").trim()}));
const parseExtras=rows=>rows.filter(r=>String(r.active).toUpperCase()!=="FALSE").map(r=>({id:String(r.id||"").trim(),type:String(r.type||"").trim(),label:String(r.label||"").trim(),price:parseFloat(r.price)||0,note:String(r.note||"").trim()}));
const parseSettings=rows=>{const s={...FALLBACK_SETTINGS};rows.forEach(r=>{if(r.key&&r.value!==undefined)s[String(r.key).trim()]=parseFloat(r.value);});return s;};
const getDiscount=(date,s)=>{if(!date)return null;const d=new Date(date+"T12:00:00").getDay();return d===5||d===6?{rate:s.discount_weekend,label:"Friday/Saturday",color:"#d97706"}:{rate:s.discount_weekday,label:"Sun–Thursday",color:"#16a34a"};};
const freeMeals=(n,s)=>{if(n<s.free_meal_min_guests)return 0;if(n<s.free_meal_next_threshold)return s.free_meal_base;return s.free_meal_next_base+Math.floor((n-s.free_meal_next_threshold)/s.free_meal_increment);};
const mkCourse=()=>({d1CourseType:"appetiser",salmon:0,reindeer:0,soup:0,veganApp:0,steak:0,char:0,veganMain:0,cake:0,veganDessert:0});

const Stepper=({val,onChange,max,vegan})=>(
  <div style={{display:"flex",alignItems:"center",border:`1px solid ${vegan?"#bbf7d0":"#d1d5db"}`,borderRadius:6,overflow:"hidden",background:vegan?"#f0fdf4":"#fff",width:110,flexShrink:0}}>
    <button onClick={()=>onChange(Math.max(0,val-1))} style={{padding:"4px 10px",border:"none",background:"transparent",cursor:"pointer",fontSize:15,fontWeight:700,borderRight:`1px solid ${vegan?"#bbf7d0":"#e5e7eb"}`}}>−</button>
    <span style={{flex:1,textAlign:"center",fontSize:14,fontWeight:700}}>{val}</span>
    <button onClick={()=>onChange(max!=null?Math.min(max,val+1):val+1)} style={{padding:"4px 10px",border:"none",background:"transparent",cursor:"pointer",fontSize:15,fontWeight:700,borderLeft:`1px solid ${vegan?"#bbf7d0":"#e5e7eb"}`}}>+</button>
  </div>
);
const CourseLine=({item,val,onChange,max})=>(
  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"6px 0",borderBottom:"1px solid #f3f4f6"}}>
    <div style={{flex:1}}>
      <span style={{fontSize:12,color:item.vegan?"#166534":"#374151"}}>{item.label}</span>
      {item.vegan&&<span style={{marginLeft:6,fontSize:10,background:"#dcfce7",color:"#166534",padding:"1px 5px",borderRadius:10,fontWeight:600}}>vegan</span>}
    </div>
    <Stepper val={val} onChange={onChange} max={max} vegan={item.vegan}/>
  </div>
);
const SectionHeader=({label,count,target})=>{
  const ok=count===target,over=count>target;
  return(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,marginTop:12}}>
      <div style={{fontWeight:600,fontSize:12,color:"#374151"}}>{label}</div>
      <div style={{fontSize:11,fontWeight:700,color:ok?"#166534":over?"#dc2626":"#9ca3af"}}>{count}/{target} {ok?"✓":over?"⚠ over":""}</div>
    </div>
  );
};

function App(){
  const[tab,setTab]=useState("quote");
  const[menus,setMenus]=useState(FALLBACK_MENUS);
  const[extras,setExtras]=useState(FALLBACK_EXTRAS);
  const[settings,setSettings]=useState(FALLBACK_SETTINGS);
  const[dataSource,setDataSource]=useState("fallback");
  const[agency,setAgency]=useState("");
  const[contact,setContact]=useState("");
  const[tourRef2,setTourRef2]=useState("");
  const[date,setDate]=useState("");
  const[time,setTime]=useState("");
  const[mealType,setMealType]=useState("dinner");
  const[menuId,setMenuId]=useState("d2");
  const[adults,setAdults]=useState(12);
  const[ch511,setCh511]=useState(0);
  const[ch04,setCh04]=useState(0);
  const[addDessert,setAddDessert]=useState(false);
  const[dessertPax,setDessertPax]=useState("");
  const[drinksQty,setDrinksQty]=useState({});
  const[vouchersQty,setVouchersQty]=useState({});
  const[cakeEnabled,setCakeEnabled]=useState(false);
  const[allergy,setAllergy]=useState("");
  const[notes,setNotes]=useState("");
  const[course,setCourse]=useState(mkCourse());
  const[upgEnabled,setUpgEnabled]=useState(false);

  useEffect(()=>{
    const has=SHEET_CONFIG.menus||SHEET_CONFIG.extras||SHEET_CONFIG.settings;
    if(!has)return;
    Promise.all([fetchSheet(SHEET_CONFIG.menus),fetchSheet(SHEET_CONFIG.extras),fetchSheet(SHEET_CONFIG.settings)]).then(([m,e,s])=>{
      let live=false;
      if(m&&m.length){setMenus(parseMenus(m));live=true;}
      if(e&&e.length){setExtras(parseExtras(e));live=true;}
      if(s&&s.length){setSettings(parseSettings(s));live=true;}
      setDataSource(live?"live":"fallback");
    });
  },[]);

  const dinnerMenus=menus.filter(m=>m.category==="dinner");
  const lunchMenus =menus.filter(m=>m.category==="lunch");
  const curMenus   =mealType==="dinner"?dinnerMenus:lunchMenus;
  const sel        =curMenus.find(m=>m.id===menuId)||curMenus[0]||{id:"",label:"",price:0,desc:""};

  const drinkItems  =extras.filter(e=>e.type==="drink");
  const voucherItems=extras.filter(e=>e.type==="voucher");
  const cakeItem    =extras.find(e=>e.id==="cake");

  const showCourses   =["d1","d2","l5"].includes(sel.id);
  const showUpgrade   =["d3","l1","l5"].includes(sel.id);
  const isD1          =sel.id==="d1";
  const isVariableMenu=sel.variablePrice===true;
  const childrenAllowed=sel.id==="l6";

  const total    =adults+ch511+ch04;
  const qualifies=total>=(settings.min_group_size||10);
  const disc     =getDiscount(date,settings);
  const rate     =qualifies?(disc?disc.rate:settings.discount_weekday):0;
  const discLabel=disc?disc.label:"Sun–Thu (default — select date to confirm)";
  const freePax  =childrenAllowed?adults:total;
  const free     =freeMeals(freePax,settings);

  const adultBase=adults*sel.price;
  const childBase=childrenAllowed?ch511*sel.price*0.5:ch511*sel.price;
  const ch04cost =childrenAllowed?0:ch04*sel.price;
  const base     =adultBase+childBase+ch04cost;
  const discAmt  =base*rate;
  const afterDisc=base-discAmt;
  const freeVal  =free*sel.price*(1-rate);

  const dinnerG  =adults+(childrenAllowed?ch511:ch511)+(!childrenAllowed?ch04:0);
  const upgPaxN  =upgEnabled?dinnerG:0;
  const upgTotal =upgPaxN*UPGRADE_PRICE;

  const showGenDessert=mealType==="lunch"&&!["l1","l5"].includes(sel.id);
  const dpax        =addDessert&&showGenDessert?(parseInt(dessertPax)||adults+(childrenAllowed?ch511:0)):0;
  const dessertTotal=dpax*1100;
  const drinksTotal =drinkItems.reduce((s,d)=>s+(drinksQty[d.id]||0)*d.price,0);
  const vouchTotal  =voucherItems.reduce((s,v)=>s+(vouchersQty[v.id]||0)*v.price,0);
  const cakeTotal   =cakeEnabled?(cakeItem&&cakeItem.price)||7990:0;
  const addOns      =dessertTotal+drinksTotal+vouchTotal+cakeTotal+upgTotal;
  const grand       =afterDisc+addOns;

  const appSum    =course.salmon+course.reindeer+course.soup+course.veganApp;
  const mainSum   =course.steak+course.char+course.veganMain;
  const dessertSum=course.cake+course.veganDessert;
  const appValid  =isD1?(course.d1CourseType==="appetiser"?appSum===dinnerG:true):appSum===dinnerG;
  const mainValid =showCourses?mainSum===dinnerG:true;
  const desValid  =sel.id==="d2"?dessertSum===dinnerG:true;
  const courseFilled=showCourses&&appValid&&mainValid&&desValid;

  const upC=(f,v)=>setCourse(p=>({...p,[f]:Math.max(0,v)}));
  const resetMenu=()=>{setCourse(mkCourse());setUpgEnabled(false);};
  const timeWarn=()=>{if(!time)return null;const[h,m]=time.split(":").map(Number);return h*60+m>=18*60+30&&h*60+m<=20*60;};
  const setDrinkQty=(id,q)=>setDrinksQty(p=>({...p,[id]:Math.max(0,q)}));
  const setVouchQty=(id,q)=>setVouchersQty(p=>({...p,[id]:Math.max(0,q)}));

  const TabBtn=({id,lbl})=>(
    <button onClick={()=>setTab(id)} style={{padding:"9px 16px",border:"none",cursor:"pointer",fontSize:14,fontWeight:tab===id?700:400,color:tab===id?"#111827":"#6b7280",background:"none",borderBottom:tab===id?"2px solid #111827":"2px solid transparent",whiteSpace:"nowrap"}}>{lbl}</button>
  );
  const Row=({l,v,green,bold})=>(
    <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:bold?14:13,fontWeight:bold?800:400,borderBottom:"1px solid #f3f4f6",color:green?"#166534":"inherit"}}>
      <span>{l}</span><span style={{fontVariantNumeric:"tabular-nums"}}>{v}</span>
    </div>
  );

  const buildCourseHTML=()=>{
    let html="";
    if(showCourses){
      const hasApp=!isD1||(isD1&&course.d1CourseType==="appetiser");
      const hasDes=sel.id==="d2"||(isD1&&course.d1CourseType==="dessert");
      const appRows=APPETIZERS.filter(a=>course[a.id]>0).map(a=>`<tr><td style="padding:4px 8px 4px 20px;color:${a.vegan?"#166534":"#111"}">${a.label}${a.vegan?" <em>(vegan)</em>":""}</td><td style="text-align:right;padding:4px 8px">${course[a.id]} guest${course[a.id]>1?"s":""}</td></tr>`).join("");
      const mainRows=MAINS.filter(m=>course[m.id]>0).map(m=>`<tr><td style="padding:4px 8px 4px 20px;color:${m.vegan?"#166534":"#111"}">${m.label}${m.vegan?" <em>(vegan)</em>":""}</td><td style="text-align:right;padding:4px 8px">${course[m.id]} guest${course[m.id]>1?"s":""}</td></tr>`).join("");
      const desRows=DINNER_DESSERTS.filter(d=>course[d.id]>0).map(d=>`<tr><td style="padding:4px 8px 4px 20px;color:${d.vegan?"#166534":"#111"}">${d.label}${d.vegan?" <em>(vegan)</em>":""}</td><td style="text-align:right;padding:4px 8px">${course[d.id]} guest${course[d.id]>1?"s":""}</td></tr>`).join("");
      html+=`<h2>Course Selections — ${sel.label}</h2>
      ${isD1?`<p style="font-size:12px;color:#666;margin-bottom:10px">Group course type: <strong>${course.d1CourseType==="appetiser"?"Appetiser + Main":"Main + Dessert"}</strong></p>`:""}
      <table style="width:100%;border-collapse:collapse;font-size:12px"><tbody>
      ${hasApp?`<tr><td colspan="2" style="padding:6px 8px;font-weight:700;background:#f5f5f5;border-bottom:1px solid #ccc">Appetiser (${dinnerG} guests)</td></tr>${appRows||'<tr><td colspan="2" style="padding:4px 8px;color:#888;font-style:italic">Not filled in</td></tr>'}`:``}
      <tr><td colspan="2" style="padding:6px 8px;font-weight:700;background:#f5f5f5;border-bottom:1px solid #ccc">Main Course (${dinnerG} guests)</td></tr>
      ${mainRows||'<tr><td colspan="2" style="padding:4px 8px;color:#888;font-style:italic">Not filled in</td></tr>'}
      ${hasDes?`<tr><td colspan="2" style="padding:6px 8px;font-weight:700;background:#f5f5f5;border-bottom:1px solid #ccc">Dessert (${dinnerG} guests)</td></tr>${desRows||'<tr><td colspan="2" style="padding:4px 8px;color:#888;font-style:italic">Not filled in</td></tr>'}`:``}
      </tbody></table>`;
    }
    if(showUpgrade&&upgEnabled){
      html+=`<h2>Dessert Upgrade — +${ISK(UPGRADE_PRICE)}/person</h2>
      <p style="font-size:12px;color:#666;">All ${dinnerG} guests · Brownie, brown sugar caramel, skyr ganache &amp; berries</p>`;
    }
    return html;
  };

  const exportQuote=()=>{
    const dayName=date?DAYS[new Date(date+"T12:00:00").getDay()]:"";
    const drinksRows=drinkItems.filter(d=>(drinksQty[d.id]||0)>0).map(d=>`<tr><td>${d.label}</td><td>${drinksQty[d.id]}</td><td style="text-align:right">${ISK(d.price)}</td><td style="text-align:right">${ISK((drinksQty[d.id]||0)*d.price)}</td></tr>`).join("");
    const vouchRows=voucherItems.filter(v=>(vouchersQty[v.id]||0)>0).map(v=>`<tr><td>${v.label} vouchers</td><td>${vouchersQty[v.id]}</td><td style="text-align:right">${ISK(v.price)}/voucher</td><td style="text-align:right">${ISK((vouchersQty[v.id]||0)*v.price)}</td></tr>`).join("");
    const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Group Booking ${quoteRef}</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Georgia,serif;color:#111;padding:40px;font-size:13px;line-height:1.6}h1{font-size:24px;font-weight:bold}h2{font-size:14px;font-weight:bold;margin:24px 0 8px;padding-bottom:4px;border-bottom:2px solid #111}.hdr{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #111;margin-bottom:24px;padding-bottom:16px}.tot{font-size:26px;font-weight:bold}.info{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;background:#f5f5f5;border:1px solid #ddd;border-radius:6px;padding:12px;margin-bottom:20px;font-size:12px}table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}th{text-align:left;padding:6px 8px;background:#f5f5f5;border-bottom:2px solid #ccc;font-size:11px;text-transform:uppercase}td{padding:6px 8px;border-bottom:1px solid #eee}tfoot td{font-weight:bold;background:#f5f5f5;border-top:2px solid #ccc}.note{background:#fffbeb;border:1px solid #fcd34d;border-radius:6px;padding:12px;margin-top:24px;font-size:11px;color:#92400e;line-height:1.7}.free{background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:10px;margin:12px 0;font-size:12px;color:#166534}.footer{margin-top:32px;padding-top:16px;border-top:1px solid #ccc;font-size:11px;color:#888;text-align:center}</style></head><body>
<div class="hdr"><div><h1>Fröken Selfoss</h1><p style="color:#666;font-size:12px">Travel Agency Group Booking · <strong>${quoteRef}</strong></p>
<p style="margin-top:6px;font-size:12px"><strong>Date:</strong> ${date?`${dayName}, ${new Date(date+"T12:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}`:""} ${time?"at "+time:""}</p>
<p style="font-size:11px;color:#888">Generated: ${new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}</p></div>
<div style="text-align:right"><p style="font-size:11px;color:#666">${isVariableMenu?"Est. Minimum":"Group Total"} (incl. VAT)</p><div class="tot">${isVariableMenu?"from ":""}${ISK(grand)}</div>
${rate>0?`<p style="font-size:12px;color:#166534;margin-top:4px">Group discount saved: <strong>${ISK(discAmt)}</strong></p>`:""}
${free>0?`<p style="font-size:12px;color:#166534">Complimentary meals: <strong>${free} included</strong></p>`:""}</div></div>
${agency||contact||tourRef2?`<div class="info">${agency?`<div><strong>Agency</strong><br>${agency}</div>`:""}${contact?`<div><strong>Contact</strong><br>${contact}</div>`:""}${tourRef2?`<div><strong>Tour Ref</strong><br>${tourRef2}</div>`:""}
<div><strong>Group Size</strong><br>${total} guests</div></div>`:""}
<h2>Pricing Summary</h2>
<table><thead><tr><th>Item</th><th>Pax</th><th style="text-align:right">Unit Price</th><th style="text-align:right">Amount</th></tr></thead><tbody>
${adults>0?`<tr><td>${sel.label} – Adults</td><td>${adults}</td><td style="text-align:right">${isVariableMenu?"from ":""}${ISK(sel.price)}</td><td style="text-align:right">${isVariableMenu?"from ":""}${ISK(adultBase)}</td></tr>`:""}
${ch511>0?`<tr><td>${sel.label} – Children 5–11 ${childrenAllowed?"(50% off)":"(full price)"}</td><td>${ch511}</td><td style="text-align:right">${ISK(childrenAllowed?sel.price*0.5:sel.price)}</td><td style="text-align:right">${ISK(childBase)}</td></tr>`:""}

              <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>Quote Breakdown</div>
              {total===0?<div style={{color:"#9ca3af",fontSize:13}}>Enter guest numbers to see your quote.</div>:!qualifies?(
                <div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:6,padding:12,fontSize:13,color:"#991b1b"}}>Minimum {settings.min_group_size} guests required.</div>
              ):(
                <>
                  <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:7,padding:"10px 12px",marginBottom:14}}>
                    <div style={{fontWeight:600,fontSize:13}}>{sel.label}</div>
                    <div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{sel.desc}</div>
                  </div>
                  <div style={{fontSize:11,color:"#6b7280",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Guest Costs</div>
                  {adults>0&&<Row l={`${adults} adults × ${ISK(sel.price)}`} v={ISK(adultBase)}/>}
                  {ch511>0&&<Row l={`${ch511} children 5–11 × ${ISK(childrenAllowed?sel.price*0.5:sel.price)}`} v={ISK(childBase)}/>}
                  {ch04>0&&childrenAllowed&&<Row l={`${ch04} children 0–4`} v="FREE" green/>}
                  {ch04>0&&!childrenAllowed&&<Row l={`${ch04} children 0–4 × ${ISK(sel.price)}`} v={ISK(ch04*sel.price)}/>}
                  <Row l="Subtotal" v={ISK(base)} bold/>
                  {rate>0&&<><Row l={`Discount – ${discLabel} (${(rate*100).toFixed(0)}%)`} v={`−${ISK(discAmt)}`} green/><Row l="After discount" v={ISK(afterDisc)} bold/></>}
                  {free>0&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:6,padding:"8px 10px",margin:"10px 0 6px",fontSize:12,color:"#166534"}}>🎁 <strong>{free} free driver/guide meal{free>1?"s":""}</strong><div style={{color:"#4ade80",marginTop:2}}>Value: {ISK(freeVal)}</div></div>}
                  {addOns>0&&<>
                    <div style={{fontSize:11,color:"#6b7280",textTransform:"uppercase",letterSpacing:.5,margin:"12px 0 6px"}}>Add-Ons</div>
                    {upgEnabled&&upgPaxN>0&&<Row l={`Dessert upgrade ×${upgPaxN}`} v={ISK(upgTotal)}/>}
                    {addDessert&&dpax>0&&<Row l={`Dessert add-on ×${dpax}`} v={ISK(dessertTotal)}/>}
                    {drinkItems.filter(d=>(drinksQty[d.id]||0)>0).map(d=><Row key={d.id} l={`${d.label} ×${drinksQty[d.id]}`} v={ISK((drinksQty[d.id]||0)*d.price)}/>)}
                    {voucherItems.filter(v=>(vouchersQty[v.id]||0)>0).map(v=><Row key={v.id} l={`${v.label} ×${vouchersQty[v.id]}`} v={ISK((vouchersQty[v.id]||0)*v.price)}/>)}
                    {cakeEnabled&&<Row l="Birthday Cake" v={ISK(cakeTotal)}/>}
                    <Row l="Add-ons total" v={ISK(addOns)} bold/>
                  </>}
                  <div style={{display:"flex",justifyContent:"space-between",padding:"12px 0 4px",fontSize:17,fontWeight:800,borderTop:"2px solid #d1d5db",marginTop:8}}>
                    <span>Grand Total</span><span>{ISK(grand)}</span>
                  </div>
                  {adults+(childrenAllowed?ch511:0)>0&&<div style={{fontSize:12,color:"#6b7280",textAlign:"right",marginTop:4}}>{ISK(Math.round(grand/(adults+(childrenAllowed?ch511:0))))} per paying guest</div>}
                  {rate>0&&<div style={{fontSize:12,color:"#16a34a",textAlign:"right",marginTop:2}}>You saved {ISK(discAmt)}</div>}
                  <div style={{marginTop:10,background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:6,padding:"10px 12px",fontSize:11,color:"#92400e",lineHeight:1.7}}>
                    <strong>All prices include VAT.</strong> Final count confirmed 24h before. Allergies 24h in advance.
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      )}

      {tab==="menus"&&(
        <div>
          {[["Dinner Menus","dinner"],["Lunch Menus","lunch"]].map(([title,cat])=>{
            const list=menus.filter(m=>m.category===cat);
            return(
              <div key={cat} style={{marginBottom:32}}>
                <h3 style={{margin:"0 0 12px",fontSize:15,fontWeight:700,borderBottom:"2px solid #e5e7eb",paddingBottom:6}}>{title}</h3>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>{[["Menu",false],["Includes",false],["Full Price",true],["Sun–Thu",true],["Fri–Sat",true]].map(([h,r])=><th key={h} style={thS(r)}>{h}</th>)}</tr></thead>
                  <tbody>
                    {list.map(m=>(
                      <tr key={m.id} style={{cursor:"pointer"}} onClick={()=>{setMealType(cat);setMenuId(m.id);resetMenu();setTab("quote");}} onMouseEnter={e=>e.currentTarget.style.background="#f9fafb"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                        <td style={tdS(false)}><span style={{fontWeight:600}}>{m.label}</span>
                          {m.id==="l6"&&<span style={{marginLeft:6,fontSize:10,background:"#eff6ff",color:"#1d4ed8",padding:"1px 5px",borderRadius:3}}>children's discounts</span>}
                          {m.variablePrice&&<span style={{marginLeft:6,fontSize:10,background:"#fffbeb",color:"#92400e",padding:"1px 5px",borderRadius:3}}>variable price</span>}
                          {["d1","d2","l5"].includes(m.id)&&<span style={{marginLeft:6,fontSize:10,background:"#f0fdf4",color:"#166534",padding:"1px 5px",borderRadius:3}}>course selection</span>}
                          {["d3","l1"].includes(m.id)&&<span style={{marginLeft:6,fontSize:10,background:"#faf5ff",color:"#7c3aed",padding:"1px 5px",borderRadius:3}}>+dessert upgrade</span>}
                        </td>
                        <td style={{...tdS(false),color:"#6b7280",fontSize:12}}>{m.desc}</td>
                        <td style={tdS(true)}>{m.variablePrice?"from ":""}{ISK(m.price)}</td>
                        <td style={{...tdS(true),color:"#166534",fontWeight:600}}>{ISK(m.price*(1-settings.discount_weekday))}</td>
                        <td style={{...tdS(true),color:"#d97706",fontWeight:600}}>{ISK(m.price*(1-settings.discount_weekend))}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {cat==="lunch"&&<p style={{fontSize:12,color:"#166534",marginTop:8}}>☕ Self-service filter coffee included with all lunch menus</p>}
              </div>
            );
          })}
        </div>
      )}

      {tab==="policy"&&(
        <div style={{maxWidth:700,fontSize:14,lineHeight:1.8,color:"#374151"}}>
          {[
            {n:"1. Group Menu Requirements",c:<p>Group menus cater to <strong>10–70 guests</strong> with a single menu choice for all. Final selection confirmed <strong>24 hours in advance</strong>.</p>},
            {n:"2. Group Discounts",c:<><p><strong>{(settings.discount_weekday*100).toFixed(0)}% discount</strong> — Sunday through Thursday</p><p><strong>{(settings.discount_weekend*100).toFixed(0)}% discount</strong> — Friday &amp; Saturday</p></>},
            {n:"3. Children's Discounts",c:<p>Only apply to <strong>Luxury Brunch Buffet (Menu #6)</strong>. Ages 0–4: complimentary. Ages 5–11: 50% off. Ages 12+: full rate.</p>},
            {n:"4. Complimentary Driver/Guide Meals",c:<p>12–19 guests: 1 free. 20–29 guests: 2 free. 30+: +1 per additional 10 guests.</p>},
            {n:"5. Booking Times",c:<p>Preferred: <strong>before 18:30</strong> or <strong>after 20:00</strong>.</p>},
            {n:"6. Allergies",c:<p>Notify <strong>24 hours in advance</strong>.</p>},
            {n:"7. Payment",c:<p>At the restaurant or via secure payment link. Automatic billing for Icelandic-registered companies.</p>},
            {n:"8. Cancellation",c:<p>Minimum <strong>6 hours' notice</strong> for no-shows. Each case handled individually.</p>},
          ].map(({n,c})=>(<div key={n} style={{marginBottom:22}}><h3 style={{margin:"0 0 6px",fontSize:15,fontWeight:700,color:"#111827"}}>{n}</h3>{c}</div>))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
